<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perspective Cube Lab · Rectilinear and Fisheye</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1016;
    --panel: #151a23;
    --panel-2: #0f141c;
    --text: #eef2f7;
    --muted: #9aa6b6;
    --border: #2a3342;
    --red: #ff4d5a;
    --green: #49d17d;
    --blue: #4aa3ff;
    --canvas-display-height: 640px;
    --ui-scale: 1;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #192131 0, var(--bg) 55%);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .app {
    width: 96vw;
    margin: 2vw auto;
  }

  h1 {
    margin: 0 0 6px;
    font-size: clamp(1.4rem, 3vw, 2.25rem);
    letter-spacing: -0.03em;
  }

  .intro {
    margin: 0 0 18px;
    color: var(--muted);
    line-height: 1.45;
  }

  .workspace {
    display: grid;
    grid-template-columns: minmax(0, 80vw) minmax(0, 15vw);
    justify-content: center;
    align-items: start;
    gap: 1vw;
    transition: grid-template-columns .2s ease, gap .2s ease;
  }

  .workspace.side-collapsed {
    grid-template-columns: minmax(0, 1fr) 34px;
    gap: 10px;
  }

  .stage-wrap {
    display: grid;
    justify-items: stretch;
    gap: 10px;
    min-width: 0;
  }

  .canvas-shell {
    position: relative;
    width: 100%;
    height: var(--canvas-display-height);
    background: #080b10;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 18px 60px rgba(0,0,0,.34);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: grab;
  }

  canvas.dragging {
    cursor: grabbing;
  }

  .controls {
    position: relative;
    display: grid;
    grid-template-rows: minmax(0, 3fr) minmax(0, 2fr);
    gap: calc(8px * var(--ui-scale));
    min-width: 0;
    height: var(--canvas-display-height);
  }

  .controls.is-collapsed {
    display: block;
  }

  .controls.is-collapsed .control-group {
    display: none;
  }

  .panel-toggle {
    display: grid;
    place-items: center;
    width: 26px;
    height: 26px;
    padding: 0;
    border: 1px solid rgba(230,238,248,.3);
    border-radius: 7px;
    background: rgba(12,16,23,.88);
    color: #dce5f0;
    font: 700 19px/1 system-ui, sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.35);
    transition: background .15s ease, border-color .15s ease, transform .15s ease;
  }

  .panel-toggle:hover,
  .panel-toggle:focus-visible {
    background: rgba(35,44,58,.96);
    border-color: rgba(230,238,248,.68);
    outline: none;
  }

  .side-panel-toggle {
    position: absolute;
    z-index: 8;
    top: 8px;
    left: 0;
    transform: translateX(-50%);
  }

  .controls.is-collapsed .side-panel-toggle {
    left: 50%;
    transform: translateX(-50%);
  }

  .legend-panel-toggle {
    position: absolute;
    z-index: 8;
    left: 50%;
    bottom: 8px;
    width: 30px;
    height: 20px;
    border-radius: 7px 7px 3px 3px;
    font-size: 15px;
    transform: translateX(-50%);
  }


  .canvas-elements-panel {
    position: absolute;
    z-index: 12;
    top: 10px;
    left: 10px;
    width: min(228px, calc(100% - 20px));
    overflow: hidden;
    border: 1px solid rgba(225,235,247,.28);
    border-radius: 9px;
    background: rgba(12,16,23,.91);
    color: var(--text);
    box-shadow: 0 7px 24px rgba(0,0,0,.38);
    backdrop-filter: blur(8px);
  }

  .canvas-elements-panel.is-collapsed {
    width: auto;
  }

  .canvas-elements-toggle {
    width: 100%;
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 5px 8px;
    border: 0;
    background: rgba(255,255,255,.055);
    color: var(--text);
    font: 700 11px/1.1 Inter, ui-sans-serif, system-ui, sans-serif;
    letter-spacing: .06em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .canvas-elements-toggle:hover,
  .canvas-elements-toggle:focus-visible {
    background: rgba(255,255,255,.12);
    outline: none;
  }

  .canvas-elements-panel.is-collapsed .canvas-elements-toggle {
    width: auto;
  }

  .canvas-elements-panel.is-collapsed .canvas-elements-body {
    display: none;
  }

  .canvas-elements-arrow {
    width: 0;
    height: 0;
    flex: 0 0 auto;
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 7px solid currentColor;
    transform: rotate(0deg);
    transform-origin: 50% 45%;
    transition: transform .16s ease;
  }

  .canvas-elements-panel.is-collapsed .canvas-elements-arrow {
    transform: rotate(-90deg);
  }

  .canvas-elements-body {
    padding: 5px 7px 7px;
  }

  .canvas-elements-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
    line-height: 1.15;
  }

  .canvas-elements-table td {
    padding: 3px 2px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    vertical-align: middle;
  }

  .canvas-elements-table tr:last-child td {
    border-bottom: 0;
  }

  .canvas-elements-table td:last-child {
    width: 26px;
    text-align: right;
  }

  .canvas-elements-table label {
    display: block;
    font-size: inherit;
    font-weight: 560;
    cursor: pointer;
  }

  .canvas-elements-table input[type="checkbox"] {
    width: 13px;
    height: 13px;
    margin: 0;
    vertical-align: middle;
  }

  .export-png-button {
    width: 100%;
    margin-top: 6px;
    padding: 7px 8px;
    border: 1px solid rgba(225,235,247,.32);
    border-radius: 6px;
    background: rgba(255,255,255,.09);
    color: var(--text);
    font: 750 10px/1 Inter, ui-sans-serif, system-ui, sans-serif;
    letter-spacing: .055em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .export-png-button:hover,
  .export-png-button:focus-visible {
    background: rgba(255,255,255,.17);
    border-color: rgba(225,235,247,.64);
    outline: none;
  }

  .control-group {
    display: grid;
    align-content: space-between;
    gap: 0;
    min-height: 0;
    overflow: hidden;
    padding: calc(6px * var(--ui-scale));
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 18px 60px rgba(0,0,0,.22);
  }

  .control-group + .control-group {
    margin-top: 0;
  }

  .control-group-title {
    margin: calc(1px * var(--ui-scale)) calc(3px * var(--ui-scale)) calc(4px * var(--ui-scale));
    color: var(--muted);
    text-align: center;
    font-size: clamp(.62rem, calc(.76rem * var(--ui-scale)), .76rem);
    font-weight: 750;
    letter-spacing: .09em;
    text-transform: uppercase;
  }

  .control {
    min-height: 0;
    padding: calc(4px * var(--ui-scale)) calc(5px * var(--ui-scale));
    border-bottom: 1px solid rgba(255,255,255,.075);
  }

  .control:last-child {
    border-bottom: 0;
  }

  .control-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: calc(5px * var(--ui-scale));
    margin-bottom: calc(2px * var(--ui-scale));
  }

  label {
    font-weight: 650;
    font-size: clamp(.68rem, calc(.88rem * var(--ui-scale)), .88rem);
    line-height: 1.12;
  }

  output {
    color: var(--muted);
    font-size: clamp(.64rem, calc(.82rem * var(--ui-scale)), .82rem);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }


  .axis-icon-sprite {
    position: absolute;
    width: 0;
    height: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .axis-label {
    display: inline-flex;
    align-items: center;
    gap: .48em;
    min-width: 0;
  }

  .axis-label svg {
    width: 1.35em;
    height: 1.35em;
    flex: 0 0 auto;
    overflow: visible;
  }

  .icon-control {
    display: grid;
    grid-template-columns: calc(66px * var(--ui-scale)) minmax(0, 1fr) auto;
    align-items: center;
    gap: calc(8px * var(--ui-scale));
  }

  .icon-control .axis-label {
    display: grid;
    place-items: center;
    width: calc(66px * var(--ui-scale));
    height: calc(66px * var(--ui-scale));
    cursor: pointer;
  }

  .icon-control .axis-label svg {
    width: calc(60px * var(--ui-scale));
    height: calc(60px * var(--ui-scale));
  }

  .icon-control input[type="range"],
  .icon-control output {
    align-self: center;
  }

  .icon-control output {
    min-width: 3.25em;
    text-align: right;
  }

  .sr-only {
    position: absolute !important;
    width: 1px !important;
    height: 1px !important;
    padding: 0 !important;
    margin: -1px !important;
    overflow: hidden !important;
    clip: rect(0, 0, 0, 0) !important;
    white-space: nowrap !important;
    border: 0 !important;
  }

  input[type="range"] {
    width: 100%;
    height: calc(18px * var(--ui-scale));
    margin: 0;
    accent-color: #dce6f4;
  }

  input[type="range"]:disabled {
    opacity: .42;
    cursor: not-allowed;
  }


  .projection-switch {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: calc(6px * var(--ui-scale));
    padding-top: calc(5px * var(--ui-scale));
    padding-bottom: calc(5px * var(--ui-scale));
  }

  .projection-button {
    min-width: 0;
    min-height: calc(58px * var(--ui-scale));
    display: grid;
    place-items: center;
    padding: calc(5px * var(--ui-scale));
    border: 1px solid rgba(255,255,255,.24);
    border-radius: calc(8px * var(--ui-scale));
    background: rgba(255,255,255,.075);
    color: var(--text);
    font: inherit;
    cursor: pointer;
    transition: opacity .16s ease, filter .16s ease, background .16s ease, border-color .16s ease;
  }

  .projection-button img {
    width: calc(46px * var(--ui-scale));
    height: calc(46px * var(--ui-scale));
    display: block;
  }

  .projection-button.is-active {
    opacity: 1;
    filter: none;
    background: rgba(255,255,255,.14);
    border-color: rgba(255,255,255,.62);
  }

  .projection-button.is-inactive {
    opacity: .34;
    filter: grayscale(1);
  }

  .projection-button:hover,
  .projection-button:focus-visible {
    opacity: .82;
    outline: none;
    border-color: rgba(255,255,255,.72);
  }

  .projection-button.is-active:hover,
  .projection-button.is-active:focus-visible {
    opacity: 1;
  }

  .toggle-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: calc(8px * var(--ui-scale));
    padding-top: calc(5px * var(--ui-scale));
    padding-bottom: calc(5px * var(--ui-scale));
  }

  .toggle-control label {
    line-height: 1.3;
  }

  input[type="checkbox"] {
    width: clamp(.9rem, calc(1.08rem * var(--ui-scale)), 1.08rem);
    height: clamp(.9rem, calc(1.08rem * var(--ui-scale)), 1.08rem);
    flex: 0 0 auto;
    accent-color: #dce6f4;
  }

  .legend {
    margin-top: 14px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: .86rem;
  }

  .legend span::before {
    content: "";
    width: .75em;
    height: .75em;
    margin-right: .42em;
    border-radius: 50%;
    display: inline-block;
    background: currentColor;
    vertical-align: -0.03em;
  }

  .legend .red { color: var(--red); }
  .legend .green { color: var(--green); }
  .legend .blue { color: var(--blue); }

  .footer-note {
    margin-top: 10px;
    color: #7d8998;
    font-size: .8rem;
  }

  @media (orientation: portrait), (max-width: 1100px) {
    .app {
      width: 98vw;
      margin: 1vw auto;
    }

    .workspace,
    .workspace.side-collapsed {
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
    }

    .stage-wrap,
    .canvas-shell,
    .controls {
      width: 100%;
    }

    .controls {
      --ui-scale: 1;
      height: auto;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: none;
      gap: 14px;
    }

    .controls.is-collapsed {
      height: 34px;
    }

    .side-panel-toggle,
    .controls.is-collapsed .side-panel-toggle {
      top: 0;
      left: 50%;
      transform: translate(-50%,-50%) rotate(90deg);
    }

    .control-group {
      overflow: visible;
    }
  }

  @media (max-width: 720px) {
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("view");
  const ctx = canvas.getContext("2d");
  const canvasShell = document.querySelector(".canvas-shell");
  const workspace = document.querySelector(".workspace");
  const sidePanel = document.getElementById("sidePanel");
  const sidePanelToggle = document.getElementById("sidePanelToggle");
  const legendPanelToggle = document.getElementById("legendPanelToggle");
  const canvasElementsPanel = document.getElementById("canvasElementsPanel");
  const canvasElementsToggle = document.getElementById("canvasElementsToggle");
  const canvasElementsArrow = document.getElementById("canvasElementsArrow");
  const exportPngButton = document.getElementById("exportPng");
  let sidePanelExpanded = true;
  let legendPanelExpanded = true;
  let canvasElementsExpanded = true;

  const canvasElementInputs = {
    cube: document.getElementById("showCube"),
    cubeAxes: document.getElementById("showCubeAxes"),
    guidelines: document.getElementById("showGuidelines"),
    vanishingPoints: document.getElementById("showVanishingPoints"),
    groundPlane: document.getElementById("showGroundPlane"),
    groundGrid: document.getElementById("showGroundGrid"),
    horizon: document.getElementById("showHorizon"),
    frameGrid: document.getElementById("showFrameGrid"),
    projectionBoundary: document.getElementById("showProjectionBoundary")
  };

  const controls = {
    cubeSize: document.getElementById("cubeSize"),
    cubeX: document.getElementById("cubeX"),
    cubeY: document.getElementById("cubeY"),
    cubeDepth: document.getElementById("cubeDepth"),
    yaw: document.getElementById("yaw"),
    roll: document.getElementById("roll"),
    pitch: document.getElementById("pitch"),
    fov: document.getElementById("fov"),
    cameraHeight: document.getElementById("cameraHeight"),
    cameraPitch: document.getElementById("cameraPitch")
  };

  const projectionButtons = {
    rectilinear: document.getElementById("rectilinearMode"),
    fisheye: document.getElementById("fisheyeMode")
  };
  let projectionMode = "rectilinear";

  const outputs = {
    cubeSize: document.getElementById("cubeSizeOut"),
    cubeX: document.getElementById("cubeXOut"),
    cubeY: document.getElementById("cubeYOut"),
    cubeDepth: document.getElementById("cubeDepthOut"),
    yaw: document.getElementById("yawOut"),
    roll: document.getElementById("rollOut"),
    pitch: document.getElementById("pitchOut"),
    fov: document.getElementById("fovOut"),
    cameraHeight: document.getElementById("cameraHeightOut"),
    cameraPitch: document.getElementById("cameraPitchOut")
  };

  const COLORS = {
    // Exact RGB colours used by the X, Y and Z rotation icons.
    x: "#ff0000",
    y: "#00ff00",
    z: "#0000ff",
    grid: "rgba(210,220,235,.18)",
    gridMajor: "rgba(235,240,247,.38)",
    horizon: "rgba(255,255,255,.50)",
    plane: "rgba(180,195,215,.07)"
  };

  // Vanishing-point markers, labels and legend accents follow their axis colours.
  // Cube edges, construction lines, local axes, guides, VP markers and legend accents share these exact icon colours.
  const VP_COLORS = {
    x: COLORS.x,
    y: COLORS.y,
    z: COLORS.z
  };

  const VP_LABEL_COLORS = {
    x: COLORS.x,
    y: COLORS.y,
    z: COLORS.z
  };

  const HORIZON_DOT_WIDTH = 1.4;
  const HORIZON_DOT_GAP = HORIZON_DOT_WIDTH * 30;
  const HORIZON_DASH = [0.01, HORIZON_DOT_GAP];

  const FISHEYE_GUIDE_INTERVAL_DEGREES = 15;
  const FISHEYE_GUIDE_DASH = [];
  const FISHEYE_GUIDE_WIDTH = 1.8;
  const FISHEYE_GUIDE_OPACITY = 0.24;

  function readCanvasVisibility() {
    return Object.fromEntries(
      Object.entries(canvasElementInputs).map(([key,input]) => [key,input.checked])
    );
  }

  const EPS = 1e-7;
  const deg = a => a * Math.PI / 180;

  const viewState = {
    panX: 0,
    panY: 0,
    zoom: 1,
    dragging: false,
    dragMode: null,
    lastX: 0,
    lastY: 0,
    startX: 0,
    startY: 0,
    startYaw: 0,
    startRoll: 0,
    startPitch: 0,
    rotateControl: null,
    rotateNormalX: 0,
    rotateNormalY: 0,
    rotateDirection: 1,
    latestProjected: null,
    latestEdges: null,
    latestEdgePaths: null,
    latestState: null,
    latestCamera: null,
    gridRows: 10
  };

  const V = {
    add: (a,b) => ({x:a.x+b.x,y:a.y+b.y,z:a.z+b.z}),
    sub: (a,b) => ({x:a.x-b.x,y:a.y-b.y,z:a.z-b.z}),
    scale: (a,s) => ({x:a.x*s,y:a.y*s,z:a.z*s}),
    dot: (a,b) => a.x*b.x+a.y*b.y+a.z*b.z,
    cross: (a,b) => ({
      x:a.y*b.z-a.z*b.y,
      y:a.z*b.x-a.x*b.z,
      z:a.x*b.y-a.y*b.x
    }),
    len: a => Math.hypot(a.x,a.y,a.z),
    norm: a => {
      const l = Math.hypot(a.x,a.y,a.z) || 1;
      return {x:a.x/l,y:a.y/l,z:a.z/l};
    }
  };

  const Q = {
    identity: () => ({w:1,x:0,y:0,z:0}),
    multiply: (a,b) => ({
      w:a.w*b.w-a.x*b.x-a.y*b.y-a.z*b.z,
      x:a.w*b.x+a.x*b.w+a.y*b.z-a.z*b.y,
      y:a.w*b.y-a.x*b.z+a.y*b.w+a.z*b.x,
      z:a.w*b.z+a.x*b.y-a.y*b.x+a.z*b.w
    }),
    normalize: q => {
      const length = Math.hypot(q.w,q.x,q.y,q.z) || 1;
      return {w:q.w/length,x:q.x/length,y:q.y/length,z:q.z/length};
    },
    fromAxis: (axis,angle) => {
      const half = angle*0.5;
      const sine = Math.sin(half);
      return {
        w:Math.cos(half),
        x:axis === "x" ? sine : 0,
        y:axis === "y" ? sine : 0,
        z:axis === "z" ? sine : 0
      };
    },
    rotate: (q,p) => {
      const u = {x:q.x,y:q.y,z:q.z};
      const dotUV = V.dot(u,p);
      const dotUU = V.dot(u,u);
      const crossUV = V.cross(u,p);
      return {
        x:2*dotUV*u.x+(q.w*q.w-dotUU)*p.x+2*q.w*crossUV.x,
        y:2*dotUV*u.y+(q.w*q.w-dotUU)*p.y+2*q.w*crossUV.y,
        z:2*dotUV*u.z+(q.w*q.w-dotUU)*p.z+2*q.w*crossUV.z
      };
    }
  };

  const ROTATION_AXES = {
    yaw: "y",
    roll: "z",
    pitch: "x"
  };

  function orientationFromSliderValues(values) {
    // Reproduce the original default Euler order only when establishing a
    // reset orientation. Subsequent slider movement uses current local axes.
    const yawQ = Q.fromAxis("y",deg(values.yaw));
    const rollQ = Q.fromAxis("z",deg(values.roll));
    const pitchQ = Q.fromAxis("x",deg(values.pitch));
    return Q.normalize(Q.multiply(pitchQ,Q.multiply(rollQ,yawQ)));
  }

  const cubeRotation = {
    q: Q.identity(),
    sliderValues: {
      yaw:+controls.yaw.value,
      roll:+controls.roll.value,
      pitch:+controls.pitch.value
    }
  };
  cubeRotation.q = orientationFromSliderValues(cubeRotation.sliderValues);

  function orientationWithLocalDelta(q,controlName,degrees) {
    const localDelta = Q.fromAxis(ROTATION_AXES[controlName],deg(degrees));
    // Right multiplication rotates around the cube's current local axis.
    return Q.normalize(Q.multiply(q,localDelta));
  }

  function applyLocalSliderRotation(controlName,newValue=+controls[controlName].value) {
    const previousValue = cubeRotation.sliderValues[controlName];
    const delta = newValue-previousValue;
    if (Math.abs(delta) > EPS) {
      cubeRotation.q = orientationWithLocalDelta(cubeRotation.q,controlName,delta);
    }
    cubeRotation.sliderValues[controlName] = newValue;
  }

  function setRotationSliderValue(controlName,value) {
    controls[controlName].value = value;
    applyLocalSliderRotation(controlName,+controls[controlName].value);
  }

  function resetCubeOrientation() {
    for (const controlName of Object.keys(ROTATION_AXES)) {
      controls[controlName].value = controls[controlName].dataset.default;
      cubeRotation.sliderValues[controlName] = +controls[controlName].value;
    }
    cubeRotation.q = orientationFromSliderValues(cubeRotation.sliderValues);
  }

  // Keep translation as persistent world-space position. Each slider delta is
  // applied along the cube's local axis at the moment the slider moves. This
  // preserves local-axis translation without letting later rotations rotate
  // the translation vector and drag the cube's pivot around the scene.
  const cubeTranslation = {
    center: {x:0,y:0,z:0},
    sliderValues: {
      cubeX:+controls.cubeX.value,
      cubeY:+controls.cubeY.value,
      cubeDepth:+controls.cubeDepth.value
    }
  };

  function localTranslationAxis(controlName,orientation=cubeRotation.q) {
    return Q.rotate(
      orientation,
      controlName === "cubeX" ? {x:1,y:0,z:0} :
      controlName === "cubeY" ? {x:0,y:1,z:0} : {x:0,y:0,z:1}
    );
  }

  function mappedTranslationValue(controlName,value,mode=projectionMode) {
    if (controlName !== "cubeDepth") return value;

    // Use the same local-Z distance response in both projection modes:
    // roughly 2× through most of the slider, then a smooth acceleration
    // toward practical infinity near either end. ±10 maps to approximately
    // ±1000 world units so the cube can become sub-pixel at the far distance.
    const magnitude = Math.abs(value);
    const farBoost = 980 * Math.pow(magnitude / 10,12);
    return Math.sign(value) * (2 * magnitude + farBoost);
  }

  function applyLocalSliderTranslation(controlName,newValue=+controls[controlName].value) {
    const previousValue = cubeTranslation.sliderValues[controlName];
    const previousMapped = mappedTranslationValue(controlName,previousValue);
    const newMapped = mappedTranslationValue(controlName,newValue);
    const delta = newMapped-previousMapped;

    if (Math.abs(delta) > EPS) {
      cubeTranslation.center = V.add(
        cubeTranslation.center,
        V.scale(localTranslationAxis(controlName),delta)
      );
    }
    cubeTranslation.sliderValues[controlName] = newValue;
  }

  function resetCubeTranslation() {
    cubeTranslation.center = {x:0,y:0,z:0};
    for (const controlName of ["cubeX","cubeY","cubeDepth"]) {
      const value = +controls[controlName].value;
      cubeTranslation.sliderValues[controlName] = 0;
      applyLocalSliderTranslation(controlName,value);
    }
  }

  resetCubeTranslation();

  function setupCamera(state, w, h) {
    // Camera translation and tilt remain locked to the global coordinate frame.
    // Camera height always moves along global Y, while pitch rotates the viewing
    // direction in the global Y-Z plane about the global X axis. Cube rotation
    // therefore has no effect on either camera control or on the horizon.
    // Use the slider's default as the permanent size-compensation reference.
    const baseFov = +(controls.fov.dataset.default || 60);
    const baseDistance = 8;

    // The rectilinear slider represents diagonal FOV. Derive the shared
    // focal length from the current canvas diagonal so X and Y remain uniform.
    // A small lower clamp avoids the singularity at exactly 0°.
    const effectiveFov = Math.max(0.1, Math.min(130, state.fov));
    const effectiveBaseFov = Math.max(0.1, Math.min(130, baseFov));
    const imageDiagonal = Math.hypot(w, h);
    const focal = (imageDiagonal * 0.5) / Math.tan(deg(effectiveFov) * 0.5);
    const baseFocal = (imageDiagonal * 0.5) / Math.tan(deg(effectiveBaseFov) * 0.5);

    let cameraDistance;
    if (state.fisheye) {
      cameraDistance = 6;
    } else {
      // Permanently counter the focal-length change so the cube remains
      // approximately the same apparent size as rectilinear FOV changes.
      cameraDistance = Math.max(0.2, baseDistance * (focal / baseFocal));
    }

    const globalX = {x:1,y:0,z:0};
    const globalY = {x:0,y:1,z:0};
    const globalZ = {x:0,y:0,z:1};

    // Deliberately use global Y rather than the camera's tilted up vector.
    const position = V.add(
      V.scale(globalY,state.cameraHeight),
      V.scale(globalZ,cameraDistance)
    );

    // Positive pitch looks upward; negative pitch looks downward. The forward
    // vector is constrained to the global Y-Z plane, so pitch is always about
    // global X and cannot roll or yaw as a side effect.
    const effectiveCameraPitch = Math.max(-89.9, Math.min(89.9, state.cameraPitch));
    const cameraPitch = deg(effectiveCameraPitch);
    const forward = V.norm(V.add(
      V.scale(globalY,Math.sin(cameraPitch)),
      V.scale(globalZ,-Math.cos(cameraPitch))
    ));
    const right = globalX;
    const up = V.norm(V.cross(right, forward));

    return {
      position,
      forward,
      right,
      up,
      // Camera projection remains independent of canvas pan and wheel zoom.
      focal,
      cx: w/2,
      cy: h/2,
      fisheye: state.fisheye,
      fisheyeRadius: Math.min(w,h) * 0.47,
      fisheyeHalfFov: Math.PI * 0.5,
      projectionLimit: Math.max(w,h) * 20
    };
  }

  function canvasViewPoint(p) {
    if (!p) return null;
    return {
      ...p,
      x: p.x * viewState.zoom + viewState.panX,
      y: p.y * viewState.zoom + viewState.panY
    };
  }

  function canvasViewDirection(v) {
    return {
      ...v,
      dx: v.dx * viewState.zoom,
      dy: v.dy * viewState.zoom
    };
  }

  function canvasViewRadius(radius) {
    return radius * viewState.zoom;
  }

  function worldToCamera(p, cam) {
    const d = V.sub(p, cam.position);
    return {
      x: V.dot(d, cam.right),
      y: V.dot(d, cam.up),
      z: V.dot(d, cam.forward)
    };
  }

  function projectCameraVectorRaw(c, cam) {
    if (!cam.fisheye) {
      if (c.z <= 0.03) return null;
      const x = cam.cx + cam.focal * c.x / c.z;
      const y = cam.cy - cam.focal * c.y / c.z;
      if (
        !Number.isFinite(x) ||
        !Number.isFinite(y) ||
        Math.abs(x-cam.cx) > cam.projectionLimit ||
        Math.abs(y-cam.cy) > cam.projectionLimit
      ) return null;
      return {x,y,depth:c.z};
    }

    const length = Math.hypot(c.x,c.y,c.z);
    if (length < EPS) return null;

    const theta = Math.acos(Math.max(-1,Math.min(1,c.z/length)));
    if (theta > cam.fisheyeHalfFov + 1e-6) return null;

    const transverse = Math.hypot(c.x,c.y);
    const radius = cam.fisheyeRadius * theta / cam.fisheyeHalfFov;

    if (transverse < EPS) {
      return {x:cam.cx,y:cam.cy,depth:length,theta};
    }

    return {
      x: cam.cx + radius * c.x / transverse,
      y: cam.cy - radius * c.y / transverse,
      depth: length,
      theta
    };
  }

  function projectCameraVector(c, cam) {
    return canvasViewPoint(projectCameraVectorRaw(c,cam));
  }

  function projectWorldRaw(p, cam) {
    return projectCameraVectorRaw(worldToCamera(p,cam),cam);
  }

  function projectWorld(p, cam) {
    return projectCameraVector(worldToCamera(p,cam),cam);
  }

  function projectDirectionRaw(dir, cam) {
    const c = {
      x: V.dot(dir, cam.right),
      y: V.dot(dir, cam.up),
      z: V.dot(dir, cam.forward)
    };

    if (cam.fisheye) {
      const projected = projectCameraVectorRaw(c,cam);
      return projected
        ? {...projected,finite:true,visible:true}
        : {finite:true,visible:false};
    }

    if (Math.abs(c.z) < EPS) {
      return {finite:false,dx:c.x,dy:-c.y,visible:false};
    }

    return {
      finite:true,
      visible:true,
      x: cam.cx + cam.focal * c.x / c.z,
      y: cam.cy - cam.focal * c.y / c.z
    };
  }

  function projectDirection(dir, cam) {
    const projected = projectDirectionRaw(dir,cam);
    return projected.finite
      ? canvasViewPoint(projected)
      : canvasViewDirection(projected);
  }

  function projectAxisVanishing(dir, cam) {
    const positive = projectDirection(dir,cam);
    if (!cam.fisheye) return {positive,negative:positive};
    return {
      positive,
      negative: projectDirection(V.scale(dir,-1),cam)
    };
  }

  function projectAxisVanishingRaw(dir, cam) {
    const positive = projectDirectionRaw(dir,cam);
    if (!cam.fisheye) return {positive,negative:positive};
    return {
      positive,
      negative: projectDirectionRaw(V.scale(dir,-1),cam)
    };
  }

  function clipInfiniteLineToRect(a, b, w, h) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const pts = [];

    function pushIf(t, x, y) {
      if (x >= -0.5 && x <= w+0.5 && y >= -0.5 && y <= h+0.5) {
        if (!pts.some(p => Math.hypot(p.x-x,p.y-y)<0.5)) pts.push({x,y,t});
      }
    }

    if (Math.abs(dx) > EPS) {
      let t = (0 - a.x)/dx; pushIf(t, 0, a.y+t*dy);
      t = (w - a.x)/dx; pushIf(t, w, a.y+t*dy);
    }
    if (Math.abs(dy) > EPS) {
      let t = (0 - a.y)/dy; pushIf(t, a.x+t*dx, 0);
      t = (h - a.y)/dy; pushIf(t, a.x+t*dx, h);
    }

    if (pts.length < 2) return null;
    pts.sort((p,q) => p.t-q.t);
    return [pts[0], pts[pts.length-1]];
  }

  function drawSegment(a, b, style, width=1, dash=[], lineCap="butt") {
    if (!a || !b) return;
    ctx.save();
    ctx.strokeStyle = style;
    ctx.lineWidth = width;
    ctx.lineCap = lineCap;
    ctx.setLineDash(dash);
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
    ctx.restore();
  }

  function drawPolyline(points, style, width=1, dash=[], close=false, fill=null, lineCap="butt") {
    if (!points || points.length < 2) return;
    ctx.save();
    ctx.strokeStyle = style;
    ctx.lineWidth = width;
    ctx.lineCap = lineCap;
    ctx.setLineDash(dash);
    if (fill) ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(points[0].x,points[0].y);
    for (let i=1; i<points.length; i++) ctx.lineTo(points[i].x,points[i].y);
    if (close) ctx.closePath();
    if (fill) ctx.fill();
    if (style) ctx.stroke();
    ctx.restore();
  }

  function sampleWorldSegment(a, b, cam, steps=32) {
    const runs = [];
    let run = [];
    for (let i=0; i<=steps; i++) {
      const t = i/steps;
      const world = {
        x:a.x+(b.x-a.x)*t,
        y:a.y+(b.y-a.y)*t,
        z:a.z+(b.z-a.z)*t
      };
      const p = projectWorld(world,cam);
      if (p) {
        run.push(p);
      } else if (run.length) {
        runs.push(run);
        run = [];
      }
    }
    if (run.length) runs.push(run);
    return runs;
  }

  function drawWorldSegment(a, b, cam, style, width=1, dash=[], steps=32) {
    if (!cam.fisheye) {
      drawSegment(projectWorld(a,cam),projectWorld(b,cam),style,width,dash);
      return;
    }
    for (const run of sampleWorldSegment(a,b,cam,steps)) {
      drawPolyline(run,style,width,dash);
    }
  }

  function drawFrameGrid(w, h) {
    const columns = 10;
    const squareSize = w / columns;
    ctx.save();
    ctx.strokeStyle = "rgba(220,230,242,.08)";
    ctx.lineWidth = 1;
    for (let i = 0; i <= columns; i++) {
      const x = i * squareSize;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = 0; y <= h + 0.01; y += squareSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGroundPlane(cam) {
    const corners = [
      {x:-5,y:0,z:-5},
      {x: 5,y:0,z:-5},
      {x: 5,y:0,z: 5},
      {x:-5,y:0,z: 5}
    ];

    if (!cam.fisheye) {
      const pts = corners.map(p => projectWorld(p,cam));
      if (pts.some(p => !p)) return;
      drawPolyline(pts,"transparent",0,[],true,COLORS.plane);
      return;
    }

    const perimeter = [];
    for (let edge=0; edge<4; edge++) {
      const a = corners[edge];
      const b = corners[(edge+1)%4];
      const runs = sampleWorldSegment(a,b,cam,32);
      if (runs.length !== 1) return;
      perimeter.push(...runs[0].slice(edge ? 1 : 0));
    }
    if (perimeter.length > 3) drawPolyline(perimeter,"transparent",0,[],true,COLORS.plane);
  }

  function drawGroundGrid(cam, w, h) {
    for (let i=-5; i<=5; i++) {
      const major = i === 0;
      const color = major ? COLORS.gridMajor : COLORS.grid;
      const width = major ? 1.4 : 1;

      drawWorldSegment({x:i,y:0,z:-5},{x:i,y:0,z:5},cam,color,width,[],64);
      drawWorldSegment({x:-5,y:0,z:i},{x:5,y:0,z:i},cam,color,width,[],64);
    }
  }

  function sampleVisibleDirectionCircle(directionAtAngle, cam, samples=360) {
    const runs = [];
    let run = [];

    for (let i=0; i<=samples; i++) {
      const angle = (i/samples)*Math.PI*2;
      const p = projectDirection(directionAtAngle(angle),cam);
      if (p.visible) {
        run.push(p);
      } else if (run.length) {
        runs.push(run);
        run = [];
      }
    }
    if (run.length) runs.push(run);

    // A visible semicircle can straddle the 0/2π sampling seam. Join those
    // two pieces so the dash pattern and curve remain visually continuous.
    if (runs.length > 1 && runs[0].length && runs[runs.length-1].length) {
      runs[0] = runs[runs.length-1].concat(runs[0]);
      runs.pop();
    }

    return runs;
  }

  function drawFisheyeGreatCircleGuides(cam, orientation=cubeRotation.q) {
    if (!cam.fisheye) return;

    // Build the guide families from the cube's rotated local basis. Each
    // coloured family therefore passes through the same positive/negative
    // vanishing points as its matching cube axis and follows every rotation.
    const rotatedBasis = {
      x: Q.rotate(orientation,{x:1,y:0,z:0}),
      y: Q.rotate(orientation,{x:0,y:1,z:0}),
      z: Q.rotate(orientation,{x:0,y:0,z:1})
    };

    const axisFamilies = [
      {
        axis:"x",
        axisVector:rotatedBasis.x,
        radialA:rotatedBasis.y,
        radialB:rotatedBasis.z
      },
      {
        axis:"y",
        axisVector:rotatedBasis.y,
        radialA:rotatedBasis.x,
        radialB:rotatedBasis.z
      },
      {
        axis:"z",
        axisVector:rotatedBasis.z,
        radialA:rotatedBasis.x,
        radialB:rotatedBasis.y
      }
    ];

    for (const family of axisFamilies) {
      const style = hexToRgba(COLORS[family.axis],FISHEYE_GUIDE_OPACITY);

      // Great-circle planes repeat after 180°, so 0° through 165° supplies
      // every unique plane at 15° intervals around the selected axis.
      for (let guideAngle=0; guideAngle<180; guideAngle+=FISHEYE_GUIDE_INTERVAL_DEGREES) {
        const guideRadians = deg(guideAngle);
        const radial = V.add(
          V.scale(family.radialA,Math.cos(guideRadians)),
          V.scale(family.radialB,Math.sin(guideRadians))
        );

        const directionAtAngle = circleAngle => V.add(
          V.scale(family.axisVector,Math.cos(circleAngle)),
          V.scale(radial,Math.sin(circleAngle))
        );

        for (const run of sampleVisibleDirectionCircle(directionAtAngle,cam,360)) {
          drawPolyline(
            run,
            style,
            FISHEYE_GUIDE_WIDTH,
            FISHEYE_GUIDE_DASH,
            false,
            null,
            "round"
          );
        }
      }
    }
  }

  function drawHorizon(cam, w, h) {
    if (cam.fisheye) {
      const runs = [];
      let run = [];
      const samples = 360;
      for (let i=0; i<=samples; i++) {
        const angle = (i/samples)*Math.PI*2;
        const p = projectDirection({x:Math.cos(angle),y:0,z:Math.sin(angle)},cam);
        if (p.visible) {
          run.push(p);
        } else if (run.length) {
          runs.push(run);
          run = [];
        }
      }
      if (run.length) runs.push(run);
      if (runs.length > 1 && runs[0].length && runs[runs.length-1].length) {
        runs[0] = runs[runs.length-1].concat(runs[0]);
        runs.pop();
      }

      for (const horizonRun of runs) drawPolyline(horizonRun,COLORS.horizon,HORIZON_DOT_WIDTH,HORIZON_DASH,false,null,"round");
      return;
    }

    const vx = projectDirection({x:1,y:0,z:0}, cam);
    const vz = projectDirection({x:0,y:0,z:1}, cam);

    let line = null;
    if (vx.finite && vz.finite) {
      line = clipInfiniteLineToRect(vx, vz, w, h);
    } else if (vx.finite && !vz.finite) {
      line = clipInfiniteLineToRect(vx, {x:vx.x+vz.dx, y:vx.y+vz.dy}, w, h);
    } else if (!vx.finite && vz.finite) {
      line = clipInfiniteLineToRect(vz, {x:vz.x+vx.dx, y:vz.y+vx.dy}, w, h);
    }

    if (line) {
      drawSegment(line[0],line[1],COLORS.horizon,HORIZON_DOT_WIDTH,HORIZON_DASH,"round");
    }
  }

  function drawVisionConeBoundary(cam) {
    if (cam.fisheye) return;
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.22)";
    ctx.lineWidth = 1.25;
    ctx.setLineDash([6,7]);
    const centre = canvasViewPoint({x:cam.cx,y:cam.cy});
    ctx.beginPath();
    ctx.arc(centre.x,centre.y,canvasViewRadius(cam.fisheyeRadius),0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  function drawFisheyeBoundary(cam) {
    if (!cam.fisheye) return;
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.34)";
    ctx.lineWidth = 2;
    const centre = canvasViewPoint({x:cam.cx,y:cam.cy});
    ctx.beginPath();
    ctx.arc(centre.x,centre.y,canvasViewRadius(cam.fisheyeRadius),0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  function cubeGeometry(state,orientation=cubeRotation.q) {
    const axes = {
      x: Q.rotate(orientation,{x:1,y:0,z:0}),
      y: Q.rotate(orientation,{x:0,y:1,z:0}),
      z: Q.rotate(orientation,{x:0,y:0,z:1})
    };

    // The centre is persistent in world space. Translation slider movement is
    // accumulated along the cube's live local X/Y/Z axes by the input handlers,
    // while rotation only changes the vertex offsets around this fixed centre.
    const center = {...cubeTranslation.center};
    const h = state.cubeSize * 0.5;

    const local = [
      {x:-h,y:-h,z:-h}, {x:h,y:-h,z:-h},
      {x:h,y:h,z:-h},   {x:-h,y:h,z:-h},
      {x:-h,y:-h,z:h},  {x:h,y:-h,z:h},
      {x:h,y:h,z:h},    {x:-h,y:h,z:h}
    ];

    const world = local.map(p => V.add(Q.rotate(orientation,p),center));

    const edges = [
      [0,1,"x"], [3,2,"x"], [4,5,"x"], [7,6,"x"],
      [0,3,"y"], [1,2,"y"], [4,7,"y"], [5,6,"y"],
      [0,4,"z"], [1,5,"z"], [2,6,"z"], [3,7,"z"]
    ];

    return {world, axes, edges, center, size: state.cubeSize};
  }

  function drawCubeAxes(center, axes, size, cam, lod={opacity:1,lineScale:1}) {
    if (lod.opacity <= 0.001) return;
    const halfLength = size * 0.72;
    for (const axis of ["x","y","z"]) {
      const start = V.add(center,V.scale(axes[axis],-halfLength));
      const end = V.add(center,V.scale(axes[axis],halfLength));
      drawWorldSegment(
        start,
        end,
        cam,
        hexToRgba(COLORS[axis],0.88 * lod.opacity),
        1.35 * lod.lineScale,
        [7,6],
        48
      );
    }
  }

  function rayToFrame(start, target, w, h) {
    const dx = target.x - start.x;
    const dy = target.y - start.y;
    const candidates = [];

    if (Math.abs(dx) > EPS) {
      const tx0 = (0 - start.x) / dx;
      const tx1 = (w - start.x) / dx;
      if (tx0 >= 0) candidates.push(tx0);
      if (tx1 >= 0) candidates.push(tx1);
    }
    if (Math.abs(dy) > EPS) {
      const ty0 = (0 - start.y) / dy;
      const ty1 = (h - start.y) / dy;
      if (ty0 >= 0) candidates.push(ty0);
      if (ty1 >= 0) candidates.push(ty1);
    }

    const valid = candidates
      .map(t => ({t, x:start.x + dx*t, y:start.y + dy*t}))
      .filter(p => p.x >= -0.5 && p.x <= w+0.5 && p.y >= -0.5 && p.y <= h+0.5)
      .sort((a,b) => a.t-b.t);

    if (!valid.length) return null;
    const end = valid[0];
    return [{x:start.x,y:start.y}, {x:end.x,y:end.y}];
  }

  function drawFisheyeConstructionRay(start, direction, targetVP, cam, style) {
    const points = [];
    const scale = 0.18;
    for (let i=0; i<=90; i++) {
      const distance = scale * (Math.exp(i/9)-1);
      const p = projectWorld(V.add(start,V.scale(direction,distance)),cam);
      if (p) {
        points.push(p);
      } else if (points.length) {
        break;
      }
    }

    if (targetVP?.visible && points.length) {
      const last = points[points.length-1];
      if (Math.hypot(last.x-targetVP.x,last.y-targetVP.y) > 0.5) points.push(targetVP);
    }
    drawPolyline(points,style,1,[5,6]);
  }

  function drawConstructionLines(world, projected, edges, axes, vanishing, cam, w, h) {
    const seen = new Set();

    for (const [a,b,axis] of edges) {
      const endpoints = [
        {idx:a,direction:V.scale(axes[axis],-1),vp:vanishing[axis].negative,sign:"-"},
        {idx:b,direction:axes[axis],vp:vanishing[axis].positive,sign:"+"}
      ];

      for (const endpoint of endpoints) {
        const key = `${endpoint.idx}-${axis}-${endpoint.sign}`;
        if (seen.has(key)) continue;
        seen.add(key);

        const p = projected[endpoint.idx];
        if (!p) continue;
        const style = hexToRgba(COLORS[axis],0.22);

        if (cam.fisheye) {
          drawFisheyeConstructionRay(world[endpoint.idx],endpoint.direction,endpoint.vp,cam,style);
          continue;
        }

        const vp = endpoint.vp;
        let ray = null;
        if (vp.finite) {
          const vpVisible = vp.x >= 0 && vp.x <= w && vp.y >= 0 && vp.y <= h;
          ray = vpVisible
            ? [{x:p.x,y:p.y},{x:vp.x,y:vp.y}]
            : rayToFrame(p,vp,w,h);
        } else {
          ray = rayToFrame(p,{x:p.x+vp.dx,y:p.y+vp.dy},w,h);
        }
        if (ray) drawSegment(ray[0],ray[1],style,1,[5,6]);
      }
    }
  }

  function hexToRgba(hex, alpha) {
    const n = parseInt(hex.slice(1),16);
    const r = (n>>16)&255, g=(n>>8)&255, b=n&255;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function drawClosestCubeFaces(world, projected, cam, lod={opacity:1,lineScale:1}) {
    if (lod.opacity <= 0.001) return;
    const facePairs = {
      x: [[0,3,7,4],[1,5,6,2]],
      y: [[0,4,5,1],[3,2,6,7]],
      z: [[0,1,2,3],[4,7,6,5]]
    };

    const faceDepth = face => face.reduce((sum,index) => {
      const cameraPoint = worldToCamera(world[index],cam);
      return sum + (cam.fisheye
        ? Math.hypot(cameraPoint.x,cameraPoint.y,cameraPoint.z)
        : cameraPoint.z);
    },0) / face.length;

    const selected = Object.entries(facePairs).map(([axis,pair]) => {
      const aDepth = faceDepth(pair[0]);
      const bDepth = faceDepth(pair[1]);
      return {axis,face:aDepth <= bDepth ? pair[0] : pair[1],depth:Math.min(aDepth,bDepth)};
    }).sort((a,b) => b.depth-a.depth);

    for (const {axis,face} of selected) {
      const perimeter = [];
      let complete = true;

      for (let i=0;i<face.length;i++) {
        const a = face[i];
        const b = face[(i+1)%face.length];
        const runs = cam.fisheye
          ? sampleWorldSegment(world[a],world[b],cam,28)
          : [[projected[a],projected[b]].filter(Boolean)];
        const run = runs.find(points => points.length >= 2);
        if (!run) { complete = false; break; }
        for (const point of run) {
          const previous = perimeter[perimeter.length-1];
          if (!previous || Math.hypot(previous.x-point.x,previous.y-point.y) > 0.01) {
            perimeter.push(point);
          }
        }
      }

      if (!complete || perimeter.length < 3) continue;
      ctx.save();
      ctx.fillStyle = hexToRgba(COLORS[axis],0.03 * lod.opacity);
      ctx.beginPath();
      ctx.moveTo(perimeter[0].x,perimeter[0].y);
      for (let i=1;i<perimeter.length;i++) ctx.lineTo(perimeter[i].x,perimeter[i].y);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFisheyeOutsideMask(cam,w,h) {
    if (!cam.fisheye) return;
    const centre = canvasViewPoint({x:cam.cx,y:cam.cy});
    const radius = canvasViewRadius(cam.fisheyeRadius);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.beginPath();
    ctx.rect(0,0,w,h);
    ctx.moveTo(centre.x+radius,centre.y);
    ctx.arc(centre.x,centre.y,radius,0,Math.PI*2);
    ctx.fill("evenodd");
    ctx.restore();
  }

  function cubeApparentLod(projected) {
    const points = projected.filter(Boolean);
    if (!points.length) return {extent:0,opacity:0,lineScale:0};

    const xs = points.map(point => point.x);
    const ys = points.map(point => point.y);
    const extent = Math.max(
      Math.max(...xs)-Math.min(...xs),
      Math.max(...ys)-Math.min(...ys)
    );

    // Fade the complete cube representation below eight projected pixels and
    // remove it entirely below half a pixel. This prevents fixed-width edges
    // and vertex dots from remaining visible after the geometry is sub-pixel.
    const t = Math.max(0,Math.min(1,(extent-0.5)/(8-0.5)));
    const opacity = t*t*(3-2*t);
    const lineScale = Math.max(0.08,Math.min(1,extent/12));
    return {extent,opacity,lineScale};
  }

  function drawCube(world, projected, edges, cam, lod={opacity:1,lineScale:1}) {
    if (lod.opacity <= 0.001) {
      viewState.latestEdgePaths = [];
      return;
    }

    const sorted = edges.slice().sort((e1,e2) => {
      const d1 = ((projected[e1[0]]?.depth || 0)+(projected[e1[1]]?.depth || 0))/2;
      const d2 = ((projected[e2[0]]?.depth || 0)+(projected[e2[1]]?.depth || 0))/2;
      return d2-d1;
    });

    const edgePaths = [];
    for (const edge of sorted) {
      const [a,b,axis] = edge;
      const runs = cam.fisheye
        ? sampleWorldSegment(world[a],world[b],cam,28)
        : [[projected[a],projected[b]].filter(Boolean)];
      edgePaths.push({edge,axis,runs});
      for (const run of runs) {
        drawPolyline(run,`rgba(0,0,0,${0.72 * lod.opacity})`,3.5 * lod.lineScale);
        drawPolyline(run,hexToRgba(COLORS[axis],lod.opacity),1.68 * lod.lineScale);
      }
    }
    viewState.latestEdgePaths = edgePaths;

    const vertexRadius = 2.3 * lod.lineScale;
    if (vertexRadius >= 0.18) {
      for (const p of projected) {
        if (!p) continue;
        ctx.save();
        ctx.fillStyle = `rgba(247,251,255,${lod.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x,p.y,vertexRadius,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function drawVanishingPoint(vp, color, label, w, h, labelColor=color) {
    if (!vp?.finite || vp.visible === false) return;
    if (vp.x < 0 || vp.x > w || vp.y < 0 || vp.y > h) return;

    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = "rgba(10,13,18,.86)";
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.arc(vp.x,vp.y,8,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = labelColor;
    ctx.font = `700 ${Math.max(11,w*0.016)}px system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    const textWidth = ctx.measureText(label).width;
    const tx = Math.max(textWidth * 0.5 + 4, Math.min(w - textWidth * 0.5 - 4, vp.x));
    const ty = vp.y - 11;
    ctx.fillText(label,tx,ty);
    ctx.restore();
  }

  function formatVPCompact(vp, viewVP, w, h) {
    if (!vp) return "—";
    if (!vp.finite) return "∞";
    if (vp.visible === false) return "Outside Hemisphere";

    // Coordinates remain camera-projection values, while frame visibility follows
    // the current 2D canvas pan/zoom view so the status matches what is on screen.
    const displayedVP = viewVP?.finite ? viewVP : vp;
    const inFrame = displayedVP.visible !== false &&
      displayedVP.x >= 0 && displayedVP.x <= w &&
      displayedVP.y >= 0 && displayedVP.y <= h;
    // Display VP coordinates in tenths of a canvas pixel, rounded to whole units.
    // Off-frame coordinates are enclosed in brackets rather than marked with "OF".
    const coordinateText = `${Math.round(vp.x / 10)},${Math.round(vp.y / 10)}`;
    return inFrame ? coordinateText : `( ${coordinateText} )`;
  }

  function formatAxisVPCompact(axisVP, viewAxisVP, w, h, fisheye) {
    if (!fisheye) return formatVPCompact(axisVP.positive,viewAxisVP.positive,w,h);
    const positive = formatVPCompact(axisVP.positive,viewAxisVP.positive,w,h);
    const negative = formatVPCompact(axisVP.negative,viewAxisVP.negative,w,h);
    return `+ ${positive}   − ${negative}`;
  }

  function roundedRectPath(x, y, width, height, radius) {
    const r = Math.max(0, Math.min(radius, width * 0.5, height * 0.5));
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+width-r,y);
    ctx.quadraticCurveTo(x+width,y,x+width,y+r);
    ctx.lineTo(x+width,y+height-r);
    ctx.quadraticCurveTo(x+width,y+height,x+width-r,y+height);
    ctx.lineTo(x+r,y+height);
    ctx.quadraticCurveTo(x,y+height,x,y+height-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function fittedFontSize(text, maxWidth, startSize, minSize, weight=600) {
    let size = startSize;
    while (size > minSize) {
      ctx.font = `${weight} ${size}px system-ui, sans-serif`;
      if (ctx.measureText(text).width <= maxWidth) break;
      size -= 1;
    }
    return size;
  }

  function drawCombinedReadoutCell(
    x, y, width, height,
    iconAxis, angleValue,
    vpTitle, vpValue, vpAccent,
    screenSize
  ) {
    const radius = Math.max(3.5, Math.min(width,height) * 0.12);
    const inset = Math.max(4.5, Math.min(width,height) * 0.10);
    const itemGap = Math.max(3, screenSize * 0.0053);
    const groupGap = Math.max(6, screenSize * 0.0093);
    const dividerGap = Math.max(5, screenSize * 0.0075);
    const dividerWidth = Math.max(1, screenSize * 0.0014);

    // Keep each global rotation and its matching VP data on one row.
    // Canvas has no layout engine, because apparently suffering builds character.
    let valueSize = Math.max(6, Math.min(16, screenSize * 0.016));
    let labelSize = valueSize * 1.2;
    let iconSize = Math.max(16, Math.min(35, screenSize * 0.0387));
    const availableWidth = width - inset * 2;
    const availableHeight = height - inset * 2;

    while (valueSize > 5) {
      iconSize = Math.max(valueSize * 2.05, Math.min(35, screenSize * 0.0387));
      labelSize = iconSize;

      // Rotation values use the same text height as the VP labels, but remain
      // regular weight. Reserve a fixed maximum angle slot so the divider
      // remains stationary while the live value changes.
      ctx.font = `400 ${labelSize}px system-ui, sans-serif`;
      const angleSlotWidth = ctx.measureText("−180°").width;

      const vpValueSize = labelSize * 0.8;
      ctx.font = `400 ${vpValueSize}px system-ui, sans-serif`;
      const vpValueWidth = ctx.measureText(vpValue).width;

      ctx.font = `750 ${labelSize}px system-ui, sans-serif`;
      const vpTitleWidth = ctx.measureText(vpTitle).width;

      const contentWidth = iconSize + itemGap + angleSlotWidth +
        dividerGap + dividerWidth + dividerGap +
        vpTitleWidth + itemGap + vpValueWidth;
      const contentHeight = Math.max(iconSize,labelSize,vpValueSize);

      if (contentWidth <= availableWidth && contentHeight <= availableHeight) break;
      valueSize -= 0.5;
    }

    iconSize = Math.max(valueSize * 2.05, Math.min(35, screenSize * 0.0387));
    labelSize = iconSize;
    const vpValueSize = labelSize * 0.8;
    const centreY = y + height * 0.5;

    ctx.save();
    roundedRectPath(x,y,width,height,radius);
    ctx.fillStyle = "rgba(9,13,19,.86)";
    ctx.fill();
    ctx.strokeStyle = "rgba(225,235,247,.24)";
    ctx.lineWidth = Math.max(1,Math.min(width,height)*0.018);
    ctx.stroke();

    let cursorX = x + inset;
    drawAxisIcon(iconAxis,cursorX,centreY-iconSize*0.5,iconSize);
    cursorX += iconSize + itemGap;

    ctx.fillStyle = "rgba(242,247,253,.94)";
    ctx.font = `400 ${labelSize}px system-ui, sans-serif`;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    const angleSlotWidth = ctx.measureText("−180°").width;
    ctx.fillText(angleValue,cursorX,centreY);
    cursorX += angleSlotWidth + dividerGap;

    ctx.beginPath();
    ctx.moveTo(cursorX, y + inset * 0.75);
    ctx.lineTo(cursorX, y + height - inset * 0.75);
    ctx.strokeStyle = "rgba(225,235,247,.32)";
    ctx.lineWidth = dividerWidth;
    ctx.stroke();
    cursorX += dividerWidth + dividerGap;

    ctx.fillStyle = vpAccent;
    ctx.font = `750 ${labelSize}px system-ui, sans-serif`;
    ctx.fillText(vpTitle,cursorX,centreY);
    cursorX += ctx.measureText(vpTitle).width + itemGap;

    ctx.fillStyle = "rgba(242,247,253,.94)";
    ctx.font = `400 ${vpValueSize}px system-ui, sans-serif`;
    const vpValueMaxWidth = Math.max(12,x+width-inset-cursorX);
    ctx.fillText(vpValue,cursorX,centreY,vpValueMaxWidth);
    ctx.restore();
  }

  function normaliseDegrees(angle) {
    let degrees = angle * 180 / Math.PI;
    degrees = ((degrees + 180) % 360 + 360) % 360 - 180;
    return Math.abs(degrees) < 0.000001 ? 0 : degrees;
  }

  function globalEulerFromQuaternion(q) {
    // Decompose the actual cube orientation using the same global-axis order
    // as the original absolute setup: Rx(pitch) · Rz(roll) · Ry(yaw).
    // This makes the legend describe the final world orientation while the
    // sliders remain incremental rotations about the cube's current axes.
    const {w,x,y,z} = Q.normalize(q);

    const m00 = 1 - 2*(y*y + z*z);
    const m01 = 2*(x*y - z*w);
    const m02 = 2*(x*z + y*w);
    const m10 = 2*(x*y + z*w);
    const m11 = 1 - 2*(x*x + z*z);
    const m20 = 2*(x*z - y*w);
    const m21 = 2*(y*z + x*w);
    const m22 = 1 - 2*(x*x + y*y);

    const sinRoll = Math.max(-1,Math.min(1,-m01));
    const roll = Math.asin(sinRoll);
    const cosRoll = Math.cos(roll);

    let pitch;
    let yaw;
    if (Math.abs(cosRoll) > 1e-7) {
      yaw = Math.atan2(m02,m00);
      pitch = Math.atan2(m21,m11);
    } else {
      // At ±90° global Z rotation, X and Y are mathematically coupled.
      // Choose yaw = 0 and place the combined rotation in pitch so the
      // displayed orientation remains stable and still reconstructs q.
      yaw = 0;
      pitch = sinRoll > 0
        ? Math.atan2(m20,m10)
        : Math.atan2(-m20,m22);
    }

    return {
      pitch: normaliseDegrees(pitch),
      yaw: normaliseDegrees(yaw),
      roll: normaliseDegrees(roll)
    };
  }

    ctx.restore();

    // Legend angles are global/world-axis Euler values derived from the cube's
    // actual quaternion. Slider outputs remain local incremental controls.
    const globalAngles = globalEulerFromQuaternion(cubeRotation.q);
    const combinedCells = [
      ["x",`${globalAngles.pitch.toFixed(0)}°`,"VP X",formatAxisVPCompact(vanishing.x,viewVanishing.x,w,h,state.fisheye),VP_COLORS.x],
      ["y",`${globalAngles.yaw.toFixed(0)}°`,"VP Y",formatAxisVPCompact(vanishing.y,viewVanishing.y,w,h,state.fisheye),VP_COLORS.y],
      ["z",`${globalAngles.roll.toFixed(0)}°`,"VP Z",formatAxisVPCompact(vanishing.z,viewVanishing.z,w,h,state.fisheye),VP_COLORS.z]
    ];

    for (let i=0;i<3;i++) {
      const x = panelX+panelPadding+i*(cellWidth+columnGap);
      drawCombinedReadoutCell(x,cellY,cellWidth,cellHeight,...combinedCells[i],screenSize);
    }
  }

  function readState() {
    return {
      cubeSize: +controls.cubeSize.value,
      cubeX: +controls.cubeX.value,
      cubeY: +controls.cubeY.value,
      cubeDepth: +controls.cubeDepth.value,
      yaw: +controls.yaw.value,
      roll: +controls.roll.value,
      pitch: +controls.pitch.value,
      fov: +controls.fov.value,
      cameraHeight: +controls.cameraHeight.value,
      cameraPitch: +controls.cameraPitch.value,
      fisheye: projectionMode === "fisheye"
    };
  }

  function updateOutputs(s) {
    outputs.cubeSize.value = s.cubeSize.toFixed(2);
    outputs.cubeX.value = s.cubeX.toFixed(2);
    outputs.cubeY.value = s.cubeY.toFixed(2);
    outputs.cubeDepth.value = s.cubeDepth.toFixed(2);
    outputs.yaw.value = `${s.yaw.toFixed(0)}°`;
    outputs.roll.value = `${s.roll.toFixed(0)}°`;
    outputs.pitch.value = `${s.pitch.toFixed(0)}°`;
    outputs.fov.value = s.fisheye ? "180° circular" : `${s.fov.toFixed(0)}° diag`;
    controls.fov.disabled = s.fisheye;
    projectionButtons.rectilinear.classList.toggle("is-active",!s.fisheye);
    projectionButtons.rectilinear.classList.toggle("is-inactive",s.fisheye);
    projectionButtons.rectilinear.setAttribute("aria-pressed",String(!s.fisheye));
    projectionButtons.fisheye.classList.toggle("is-active",s.fisheye);
    projectionButtons.fisheye.classList.toggle("is-inactive",!s.fisheye);
    projectionButtons.fisheye.setAttribute("aria-pressed",String(s.fisheye));
    outputs.cameraHeight.value = s.cameraHeight.toFixed(2);
    outputs.cameraPitch.value = `${s.cameraPitch.toFixed(0)}°`;
  }

  function updateLayoutMetrics() {
    const shellRect = canvasShell.getBoundingClientRect();
    const workspaceRect = document.querySelector(".workspace").getBoundingClientRect();
    const width = Math.max(1, shellRect.width);
    const squareSize = width / 10;

    // Match the lower viewport gap to the horizontal outer gap around the
    // canvas/control pair. Height is no longer rounded to complete grid rows.
    const sidePadding = Math.max(0, Math.min(
      workspaceRect.left,
      window.innerWidth - workspaceRect.right
    ));
    const availableHeight = window.innerHeight - shellRect.top - sidePadding;
    const narrowLayout = window.matchMedia("(orientation: portrait), (max-width: 1100px)").matches;

    // In the stacked layout the controls sit below the canvas. Do not let the
    // canvas consume the complete remaining viewport, otherwise the controls
    // are correctly laid out but stranded below the fold. Reserve roughly 38%
    // of the visible height for the first control row and cap the canvas to its
    // available width so portrait screens do not produce an excessively tall
    // drawing area.
    const height = narrowLayout
      ? Math.max(260, Math.min(width, availableHeight * 0.62))
      : Math.max(180, availableHeight);
    const uiScale = Math.max(0.58, Math.min(1, height / 720));

    viewState.gridRows = height / squareSize;
    document.documentElement.style.setProperty("--canvas-display-height", `${height}px`);
    document.documentElement.style.setProperty("--ui-scale", uiScale.toFixed(3));
  }

  function resizeCanvas() {
    updateLayoutMetrics();
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    let width = Math.max(320, Math.round(rect.width * dpr));
    let height = Math.max(180, Math.round(rect.height * dpr));
    const backingScale = Math.min(1, 2048 / width, 2048 / height);
    width = Math.max(1, Math.round(width * backingScale));
    height = Math.max(1, Math.round(height * backingScale));

    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    return {w:width,h:height,dpr:dpr * backingScale};
  }

  function canvasPointFromEvent(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (event.clientX - rect.left) * canvas.width / rect.width,
      y: (event.clientY - rect.top) * canvas.height / rect.height
    };
  }

  function distanceToSegment(p, a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const l2 = dx*dx + dy*dy;
    if (l2 < EPS) return Math.hypot(p.x-a.x, p.y-a.y);
    let t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / l2;
    t = Math.max(0, Math.min(1, t));
    const x = a.x + t*dx;
    const y = a.y + t*dy;
    return Math.hypot(p.x-x, p.y-y);
  }

  function nearestCubeEdge(point, threshold) {
    if (!viewState.latestEdgePaths) return null;
    let best = null;
    for (const entry of viewState.latestEdgePaths) {
      for (const run of entry.runs) {
        for (let i=0; i<run.length-1; i++) {
          const a = run[i];
          const b = run[i+1];
          const d = distanceToSegment(point,a,b);
          if (d <= threshold && (!best || d < best.distance)) {
            best = {edge:entry.edge,a,b,axis:entry.axis,distance:d};
          }
        }
      }
    }
    return best;
  }

  function projectedEdgeMidpointFor(state,edge,orientation=cubeRotation.q) {
    const cam = setupCamera(state,canvas.width,canvas.height);
    const cube = cubeGeometry(state,orientation);
    const [aIdx,bIdx] = edge;
    const a = projectWorld(cube.world[aIdx],cam);
    const b = projectWorld(cube.world[bIdx],cam);
    if (!a || !b) return null;
    return {x:(a.x+b.x)/2,y:(a.y+b.y)/2};
  }

  function edgeDepthMetric(edge, cube, cam) {
    const [aIdx,bIdx] = edge;

    // Rectilinear depth is measured along the camera's forward direction.
    // In fisheye mode, radial camera distance gives the more useful ordering.
    if (!cam.fisheye) {
      const aDepth = worldToCamera(cube.world[aIdx],cam).z;
      const bDepth = worldToCamera(cube.world[bIdx],cam).z;
      return (aDepth+bDepth)*0.5;
    }

    const aDepth = V.len(V.sub(cube.world[aIdx],cam.position));
    const bDepth = V.len(V.sub(cube.world[bIdx],cam.position));
    return (aDepth+bDepth)*0.5;
  }

  function isRearParallelEdge(hit, state) {
    const cam = setupCamera(state,canvas.width,canvas.height);
    const cube = cubeGeometry(state);
    const parallelEdges = cube.edges
      .filter(edge => edge[2] === hit.axis)
      .map(edge => ({edge,depth:edgeDepthMetric(edge,cube,cam)}))
      .sort((a,b) => a.depth-b.depth);

    const hitIndex = parallelEdges.findIndex(({edge}) =>
      edge[0] === hit.edge[0] && edge[1] === hit.edge[1]
    );

    // Each axis has four parallel edges. The farther two use the reversed
    // drag sign so front and rear edges rotate naturally in screen space.
    return hitIndex >= Math.floor(parallelEdges.length/2);
  }

  function chooseRotationControl(hit, state) {
    const ex = hit.b.x-hit.a.x;
    const ey = hit.b.y-hit.a.y;
    const el = Math.hypot(ex,ey) || 1;
    const nx = -ey/el;
    const ny = ex/el;
    const base = {x:(hit.a.x+hit.b.x)/2,y:(hit.a.y+hit.b.y)/2};

    const tests = Object.fromEntries(Object.keys(ROTATION_AXES).map(controlName => [
      controlName,
      orientationWithLocalDelta(cubeRotation.q,controlName,1)
    ]));

    const scores = Object.fromEntries(Object.entries(tests).map(([control,testOrientation]) => {
      const midpoint = projectedEdgeMidpointFor(state,hit.edge,testOrientation);
      const score = midpoint
        ? Math.abs((midpoint.x-base.x)*nx + (midpoint.y-base.y)*ny)
        : 0;
      return [control,score];
    }));

    const control = Object.keys(scores).reduce((best,current) =>
      scores[current] > scores[best] ? current : best
    , "yaw");

    return {
      control,
      nx,
      ny,
      dragSign:isRearParallelEdge(hit,state) ? -1 : 1
    };
  }

  function renderScene(w,h,{updateUi=true}={}) {
    const state = readState();
    if (updateUi) updateOutputs(state);

    ctx.clearRect(0,0,w,h);

    const gradient = ctx.createLinearGradient(0,0,0,h);
    gradient.addColorStop(0,"#111824");
    gradient.addColorStop(0.52,"#0d121a");
    gradient.addColorStop(1,"#080b10");
    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,w,h);

    const cam = setupCamera(state,w,h);
    const visible = readCanvasVisibility();
    if (visible.frameGrid) drawFrameGrid(w,h);

    if (cam.fisheye) {
      const centre = canvasViewPoint({x:cam.cx,y:cam.cy});
      ctx.save();
      ctx.beginPath();
      ctx.arc(centre.x,centre.y,canvasViewRadius(cam.fisheyeRadius),0,Math.PI*2);
      ctx.clip();
    }

    if (visible.guidelines) drawFisheyeGreatCircleGuides(cam,cubeRotation.q);
    if (visible.groundPlane) drawGroundPlane(cam);
    if (visible.groundGrid) drawGroundGrid(cam,w,h);
    if (visible.horizon) drawHorizon(cam,w,h);

    const cube = cubeGeometry(state);
    const projected = cube.world.map(p => projectWorld(p,cam));
    viewState.latestProjected = projected;
    viewState.latestEdges = cube.edges;
    viewState.latestState = state;
    viewState.latestCamera = cam;
    const vanishing = {
      x: projectAxisVanishing(cube.axes.x,cam),
      y: projectAxisVanishing(cube.axes.y,cam),
      z: projectAxisVanishing(cube.axes.z,cam)
    };
    const rawVanishing = {
      x: projectAxisVanishingRaw(cube.axes.x,cam),
      y: projectAxisVanishingRaw(cube.axes.y,cam),
      z: projectAxisVanishingRaw(cube.axes.z,cam)
    };

    // Apply apparent-size attenuation in both projection modes so local-Z
    // movement can make the cube genuinely disappear at practical infinity.
    const cubeLod = cubeApparentLod(projected);

    if (visible.cube) drawClosestCubeFaces(cube.world,projected,cam,cubeLod);
    if (visible.guidelines) drawConstructionLines(cube.world,projected,cube.edges,cube.axes,vanishing,cam,w,h);
    if (visible.cubeAxes) drawCubeAxes(cube.center,cube.axes,cube.size,cam,cubeLod);
    if (visible.cube) drawCube(cube.world,projected,cube.edges,cam,cubeLod);

    if (cam.fisheye) ctx.restore();
    drawFisheyeOutsideMask(cam,w,h);

    if (visible.projectionBoundary) {
      drawVisionConeBoundary(cam);
      if (cam.fisheye) drawFisheyeBoundary(cam);
    }

    if (visible.vanishingPoints) {
      if (cam.fisheye) {
        drawVanishingPoint(vanishing.x.positive,VP_COLORS.x,"VP +X",w,h,VP_LABEL_COLORS.x);
        drawVanishingPoint(vanishing.x.negative,VP_COLORS.x,"VP −X",w,h,VP_LABEL_COLORS.x);
        drawVanishingPoint(vanishing.y.positive,VP_COLORS.y,"VP +Y",w,h,VP_LABEL_COLORS.y);
        drawVanishingPoint(vanishing.y.negative,VP_COLORS.y,"VP −Y",w,h,VP_LABEL_COLORS.y);
        drawVanishingPoint(vanishing.z.positive,VP_COLORS.z,"VP +Z",w,h,VP_LABEL_COLORS.z);
        drawVanishingPoint(vanishing.z.negative,VP_COLORS.z,"VP −Z",w,h,VP_LABEL_COLORS.z);
      } else {
        drawVanishingPoint(vanishing.x.positive,VP_COLORS.x,"VP X",w,h,VP_LABEL_COLORS.x);
        drawVanishingPoint(vanishing.y.positive,VP_COLORS.y,"VP Y",w,h,VP_LABEL_COLORS.y);
        drawVanishingPoint(vanishing.z.positive,VP_COLORS.z,"VP Z",w,h,VP_LABEL_COLORS.z);
      }
    }

    // Report camera-space projection coordinates, unaffected by canvas navigation.
    if (legendPanelExpanded) {
      drawCanvasReadouts(rawVanishing,vanishing,state,w,h);
    } else {
      legendPanelToggle.style.bottom = "8px";
    }

    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,.16)";
    ctx.lineWidth = 2;
    ctx.strokeRect(1,1,w-2,h-2);
    ctx.restore();

    }

  function draw() {
    const {w,h} = resizeCanvas();
    renderScene(w,h,{updateUi:true});
  }

  let drawRequested = false;
  function requestDraw() {
    if (drawRequested) return;
    drawRequested = true;
    requestAnimationFrame(() => {
      drawRequested = false;
      draw();
    });
  }

  const rotationControlByElement = new Map([
    [controls.yaw,"yaw"],
    [controls.roll,"roll"],
    [controls.pitch,"pitch"]
  ]);

  const translationControlByElement = new Map([
    [controls.cubeX,"cubeX"],
    [controls.cubeY,"cubeY"],
    [controls.cubeDepth,"cubeDepth"]
  ]);

  Object.values(controls).forEach(el => {
    const rotationControlName = rotationControlByElement.get(el);
    const translationControlName = translationControlByElement.get(el);

    el.addEventListener("input", () => {
      if (rotationControlName) applyLocalSliderRotation(rotationControlName);
      if (translationControlName) applyLocalSliderTranslation(translationControlName);
      requestDraw();
    });

    el.addEventListener("change", () => {
      if (rotationControlName) applyLocalSliderRotation(rotationControlName);
      if (translationControlName) applyLocalSliderTranslation(translationControlName);
      requestDraw();
    });

    el.addEventListener("dblclick", event => {
      event.preventDefault();
      if (rotationControlName) {
        // A single Euler component cannot be reset independently after local
        // rotations, so reset the complete cube orientation coherently.
        resetCubeOrientation();
      } else if (translationControlName) {
        el.value = el.dataset.default;
        applyLocalSliderTranslation(translationControlName,+el.value);
      } else if (el.type === "checkbox") {
        el.checked = el.dataset.default === "true";
      } else {
        el.value = el.dataset.default;
      }
      requestDraw();
    });
  });

  // Keep FOV rendering live even in browsers or embedded viewers that are
  // inconsistent about range-control event coalescing.
  controls.fov.addEventListener("input", requestDraw, {passive:true});
  controls.fov.addEventListener("change", requestDraw, {passive:true});

  projectionButtons.rectilinear.addEventListener("click", () => {
    projectionMode = "rectilinear";
    requestDraw();
  });

  projectionButtons.fisheye.addEventListener("click", () => {
    projectionMode = "fisheye";
    requestDraw();
  });

  Object.values(canvasElementInputs).forEach(input => {
    input.addEventListener("change", requestDraw);
  });

  canvasElementsToggle.addEventListener("click", event => {
    event.preventDefault();
    event.stopPropagation();
    canvasElementsExpanded = !canvasElementsExpanded;
    canvasElementsPanel.classList.toggle("is-collapsed",!canvasElementsExpanded);
    canvasElementsToggle.setAttribute("aria-expanded",String(canvasElementsExpanded));
    canvasElementsToggle.setAttribute("aria-label",canvasElementsExpanded ? "Collapse Elements" : "Expand Elements");
  });

  function exportCanvasPng() {
    const exportSize = 2000;
    const originalWidth = canvas.width;
    const originalHeight = canvas.height;

    // Render the scene again at the final pixel dimensions. This preserves
    // line geometry, curves, labels and projection calculations at native
    // export resolution instead of enlarging the displayed canvas bitmap.
    canvas.width = exportSize;
    canvas.height = exportSize;
    renderScene(exportSize,exportSize,{updateUi:false});

    const pngUrl = canvas.toDataURL("image/png");

    // Restore the interactive display immediately after the synchronous
    // export snapshot has been encoded.
    canvas.width = originalWidth;
    canvas.height = originalHeight;
    draw();

    const link = document.createElement("a");
    link.href = pngUrl;
    link.download = "perspective_cube_canvas_2000x2000.png";
    document.body.appendChild(link);
    link.click();
    link.remove();
  }

  exportPngButton.addEventListener("click", exportCanvasPng);

  sidePanelToggle.addEventListener("click", event => {
    event.preventDefault();
    event.stopPropagation();
    sidePanelExpanded = !sidePanelExpanded;
    workspace.classList.toggle("side-collapsed",!sidePanelExpanded);
    sidePanel.classList.toggle("is-collapsed",!sidePanelExpanded);
    sidePanelToggle.textContent = sidePanelExpanded ? "›" : "‹";
    sidePanelToggle.setAttribute("aria-expanded",String(sidePanelExpanded));
    sidePanelToggle.setAttribute("aria-label",sidePanelExpanded ? "Collapse control panel" : "Expand control panel");
    sidePanelToggle.title = sidePanelExpanded ? "Collapse control panel" : "Expand control panel";
    requestAnimationFrame(requestDraw);
  });

  legendPanelToggle.addEventListener("click", event => {
    event.preventDefault();
    event.stopPropagation();
    legendPanelExpanded = !legendPanelExpanded;
    legendPanelToggle.textContent = legendPanelExpanded ? "▾" : "▴";
    legendPanelToggle.setAttribute("aria-expanded",String(legendPanelExpanded));
    legendPanelToggle.setAttribute("aria-label",legendPanelExpanded ? "Collapse canvas legend" : "Expand canvas legend");
    legendPanelToggle.title = legendPanelExpanded ? "Collapse canvas legend" : "Expand canvas legend";
    requestDraw();
  });

  workspace.addEventListener("transitionend", event => {
    if (event.propertyName === "grid-template-columns" || event.propertyName === "gap") {
      requestDraw();
    }
  });

  canvas.addEventListener("pointerdown", event => {
    if (event.button !== 0) return;
    const p = canvasPointFromEvent(event);
    const threshold = Math.max(8, canvas.width * 0.014);
    const hit = nearestCubeEdge(p,threshold);

    viewState.dragging = true;
    viewState.lastX = p.x;
    viewState.lastY = p.y;
    viewState.startX = p.x;
    viewState.startY = p.y;
    canvas.classList.add("dragging");
    canvas.setPointerCapture(event.pointerId);

    if (hit && viewState.latestState) {
      const choice = chooseRotationControl(hit,viewState.latestState);
      viewState.dragMode = "rotate";
      viewState.rotateControl = choice.control;
      viewState.rotateNormalX = choice.nx;
      viewState.rotateNormalY = choice.ny;
      viewState.rotateDirection = choice.dragSign;
      viewState.startYaw = +controls.yaw.value;
      viewState.startRoll = +controls.roll.value;
      viewState.startPitch = +controls.pitch.value;
    } else {
      viewState.dragMode = "pan";
    }
  });

  canvas.addEventListener("pointermove", event => {
    if (!viewState.dragging) return;
    const p = canvasPointFromEvent(event);

    if (viewState.dragMode === "rotate") {
      const dx = p.x-viewState.startX;
      const dy = p.y-viewState.startY;
      const signedDistance = dx*viewState.rotateNormalX + dy*viewState.rotateNormalY;
      const degrees = signedDistance * 0.22 * viewState.rotateDirection;

      if (viewState.rotateControl === "yaw") {
        setRotationSliderValue("yaw",Math.max(-90,Math.min(90,viewState.startYaw+degrees)));
      } else if (viewState.rotateControl === "roll") {
        setRotationSliderValue("roll",Math.max(-90,Math.min(90,viewState.startRoll+degrees)));
      } else {
        setRotationSliderValue("pitch",Math.max(-90,Math.min(90,viewState.startPitch+degrees)));
      }
      requestDraw();
    } else {
      viewState.panX += p.x-viewState.lastX;
      viewState.panY += p.y-viewState.lastY;
      viewState.lastX = p.x;
      viewState.lastY = p.y;
      requestDraw();
    }
  });

  function endPan(event) {
    if (!viewState.dragging) return;
    viewState.dragging = false;
    viewState.dragMode = null;
    viewState.rotateControl = null;
    viewState.rotateDirection = 1;
    canvas.classList.remove("dragging");
    if (event && canvas.hasPointerCapture(event.pointerId)) {
      canvas.releasePointerCapture(event.pointerId);
    }
  }

  canvas.addEventListener("pointerup", endPan);
  canvas.addEventListener("pointercancel", endPan);
  canvas.addEventListener("pointerleave", event => {
    if (event.buttons === 0) endPan(event);
  });

  canvas.addEventListener("dblclick", event => {
    event.preventDefault();

    // Reset every slider while deliberately preserving the projection mode.
    Object.values(controls).forEach(control => {
      if (control.type === "range") control.value = control.dataset.default;
    });
    resetCubeOrientation();
    resetCubeTranslation();

    viewState.panX = 0;
    viewState.panY = 0;
    viewState.zoom = 1;
    requestDraw();
  });

  canvas.addEventListener("wheel", event => {
    event.preventDefault();

    // Zoom the already-projected canvas image around the pointer. This is a
    // 2D navigation transform only; it never changes camera or cube state.
    const pointer = canvasPointFromEvent(event);
    const canvasX = (pointer.x-viewState.panX) / viewState.zoom;
    const canvasY = (pointer.y-viewState.panY) / viewState.zoom;
    const factor = Math.exp(-event.deltaY * 0.0012);
    const nextZoom = Math.min(8,Math.max(0.2,viewState.zoom*factor));

    viewState.zoom = nextZoom;
    viewState.panX = pointer.x-canvasX*nextZoom;
    viewState.panY = pointer.y-canvasY*nextZoom;
    requestDraw();
  }, {passive:false});

  window.addEventListener("resize", requestDraw, {passive:true});
  draw();
})();
</script>
</body>
</html>
